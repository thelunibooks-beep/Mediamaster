<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#002D62">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ocom Àudio">
    <title>Ocom Àudio Transcripcions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.all.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .drag-active { border-color: #002D62; background-color: #f0f7ff; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 pb-20">

    <div class="max-w-4xl mx-auto px-4 py-8 md:py-12">
        <header class="text-center mb-10 fade-in flex flex-col items-center">
            <div class="mb-4 drop-shadow-lg">
                <svg class="w-24 h-24" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M50 5 C75 5 85 15 85 45 C85 70 50 95 50 95 C50 95 15 70 15 45 C15 15 25 5 50 5 Z" fill="#002D62" stroke="#FFFFFF" stroke-width="3"/>
                    <path d="M50 15 L50 75 M25 45 L75 45" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
                    <rect x="32" y="27" width="12" height="12" rx="2" fill="#E31B23" stroke="#FFFFFF" stroke-width="1.5" />
                    <rect x="56" y="27" width="12" height="12" rx="2" fill="#E31B23" stroke="#FFFFFF" stroke-width="1.5" />
                    <rect x="32" y="51" width="12" height="12" rx="2" fill="#E31B23" stroke="#FFFFFF" stroke-width="1.5" />
                    <rect x="56" y="51" width="12" height="12" rx="2" fill="#E31B23" stroke="#FFFFFF" stroke-width="1.5" />
                </svg>
            </div>
            <h1 class="text-4xl font-black text-slate-900 mb-2 tracking-tight">Ocom Àudio Transcripcions</h1>
            <p class="text-slate-500 font-medium">Extreu i converteix àudio a MP3 - Transcripció d'àudio intel·ligent</p>
        </header>

        <div id="dropZone" class="bg-white border-2 border-dashed border-slate-300 rounded-[2rem] p-12 text-center transition-all cursor-pointer hover:border-blue-800 mb-8 shadow-sm">
            <input type="file" id="fileInput" class="hidden" accept="audio/*,video/*">
            <div class="w-24 h-24 bg-blue-50 text-blue-950 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-cloud-upload-alt text-4xl text-[#002D62]"></i>
            </div>
            <p class="text-2xl font-bold text-slate-800">Puja un Àudio o Vídeo</p>
            <div id="selectedFileInfo" class="mt-8 hidden">
                <span class="inline-flex items-center px-6 py-3 rounded-2xl text-base font-bold bg-[#002D62] text-white">
                    <i id="fileIcon" class="fas fa-file-audio mr-3"></i> <span id="fileNameDisplay">arxiu</span>
                </span>
            </div>
        </div>

        <div id="actionsSection" class="hidden grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8">
            <button id="convertBtn" class="bg-slate-800 text-white font-bold py-6 px-6 rounded-3xl transition-all shadow-xl active:scale-95">Extreure MP3</button>
            <button id="transcribeBtn" class="bg-[#002D62] text-white font-bold py-6 px-6 rounded-3xl transition-all shadow-xl active:scale-95">Transcriure amb IA</button>
        </div>

        <div id="progressState" class="hidden mb-8 bg-white p-8 rounded-[2rem] shadow-lg border">
            <div class="flex items-center justify-between mb-4">
                <span id="progressLabel" class="text-sm font-black text-slate-500 uppercase">Processant...</span>
                <span id="percentLabel" class="text-xl font-black text-[#002D62]">0%</span>
            </div>
            <div class="w-full bg-slate-100 rounded-full h-4"><div id="progressBar" class="bg-[#002D62] h-full rounded-full w-0"></div></div>
        </div>

        <div id="resultSection" class="hidden bg-white rounded-[2rem] shadow-2xl overflow-hidden mb-8">
            <div class="bg-slate-50 px-8 py-6 border-b flex justify-between gap-4">
                <h3 class="font-bold text-slate-800">Transcripció</h3>
                <div class="flex gap-2">
                    <button id="copyBtn" class="bg-white border px-4 py-2 rounded-xl text-sm font-bold">Copiar</button>
                    <button id="pdfBtn" class="bg-white border px-4 py-2 rounded-xl text-sm font-bold text-red-600">PDF</button>
                </div>
            </div>
            <div class="p-8"><div id="transcriptionContent" class="text-slate-600 whitespace-pre-wrap text-lg min-h-[200px]" contenteditable="true"></div></div>
        </div>

        <footer class="text-center mt-12 mb-4 text-xs text-slate-400 font-semibold">
            Creat per RLTR amb l'ajuda de la IA [=_=]
        </footer>
    </div>

    <script>
        // CLAU API PARTIDA PER SEGURETAT
        const CLAU_PART1 = "AQ.Ab8RN6JjlxfgwZf-"; 
        const CLAU_PART2 = "QNIKzS4xwPT16YaJoWOJliRY82yFuaBb2A"; 

        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const actionsSection = document.getElementById('actionsSection');
        const resultSection = document.getElementById('resultSection');
        const progressState = document.getElementById('progressState');
        const progressBar = document.getElementById('progressBar');
        const transcriptionContent = document.getElementById('transcriptionContent');
        
        let currentFile = null;

        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('drag-active'); };
        dropZone.ondragleave = () => dropZone.classList.remove('drag-active');
        dropZone.ondrop = (e) => { e.preventDefault(); dropZone.classList.remove('drag-active'); if (e.dataTransfer.files.length > 0) handleFileSelect(e.dataTransfer.files[0]); };
        fileInput.onchange = (e) => { if (e.target.files.length > 0) handleFileSelect(e.target.files[0]); };

        function handleFileSelect(file) {
            currentFile = file;
            document.getElementById('fileNameDisplay').innerText = file.name;
            document.getElementById('selectedFileInfo').classList.remove('hidden');
            actionsSection.classList.remove('hidden');
        }

        // Funció CRÍTICA per evitar error 404 de Google
        function getSanitizedMimeType(file) {
            const ext = file.name.split('.').pop().toLowerCase();
            const types = { 'mp3':'audio/mp3', 'm4a':'audio/m4a', 'wav':'audio/wav', 'ogg':'audio/ogg', 'mp4':'video/mp4', 'mov':'video/quicktime' };
            return types[ext] || file.type || 'audio/mp3';
        }

        document.getElementById('transcribeBtn').onclick = async () => {
            const reader = new FileReader();
            reader.readAsDataURL(currentFile);
            reader.onload = async () => {
                const base64Data = reader.result.split(',')[1];
                const mimeType = getSanitizedMimeType(currentFile);
                const apiKey = CLAU_PART1 + CLAU_PART2;

                try {
                    progressState.classList.remove('hidden');
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [
                                { text: "Transcriu en català correctament, sense salutacions. Retorna només el text net." },
                                { inlineData: { mimeType: mimeType, data: base64Data } }
                            ]}]
                        })
                    });
                    const res = await response.json();
                    transcriptionContent.innerText = res.candidates[0].content.parts[0].text;
                    resultSection.classList.remove('hidden');
                    progressState.classList.add('hidden');
                } catch (e) {
                    alert("Error: " + e.message);
                    progressState.classList.add('hidden');
                }
            };
        };

        document.getElementById('copyBtn').onclick = () => { navigator.clipboard.writeText(transcriptionContent.innerText); alert("Copiat!"); };
        document.getElementById('pdfBtn').onclick = () => { const { jsPDF } = window.jspdf; const doc = new jsPDF(); doc.text(transcriptionContent.innerText, 10, 10); doc.save("transcripcio.pdf"); };
    </script>
</body>
</html>
