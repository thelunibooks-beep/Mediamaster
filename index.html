<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MediaMaster">
    
    <!-- Iconos PWA -->
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3060/3060714.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3060/3060714.png">

    <title>MediaMaster - PWA Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.all.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .drag-active { border-color: #4f46e5; background-color: #f5f3ff; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #pwaInstallBanner {
            display: none;
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 400px;
            background: #1e293b;
            color: white;
            padding: 20px;
            border-radius: 24px;
            z-index: 100;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 pb-20">

    <div class="max-w-4xl mx-auto px-4 py-8 md:py-12">
        <header class="text-center mb-10 fade-in">
            <div class="inline-block p-4 bg-indigo-600 rounded-3xl mb-4 shadow-xl shadow-indigo-200">
                <i class="fas fa-microphone-alt text-4xl text-white"></i>
            </div>
            <h1 class="text-4xl font-black text-slate-900 mb-2 tracking-tight">MediaMaster <span class="text-indigo-600 italic">PWA</span></h1>
            <p class="text-slate-500 font-medium">Extrae audio y transcribe con IA. Sin lÃ­mites.</p>
        </header>

        <div id="dropZone" class="bg-white border-2 border-dashed border-slate-300 rounded-[2rem] p-12 text-center transition-all cursor-pointer hover:border-indigo-500 group mb-8 shadow-sm hover:shadow-xl">
            <input type="file" id="fileInput" class="hidden" accept="audio/*,video/*">
            <div class="w-24 h-24 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform duration-500">
                <i class="fas fa-cloud-upload-alt text-4xl"></i>
            </div>
            <p class="text-2xl font-bold text-slate-800">Sube un Audio o Video</p>
            <p class="text-slate-400 mt-2">Compatible con MP4, MOV, MP3, M4A...</p>
            
            <div id="selectedFileInfo" class="mt-8 hidden fade-in">
                <span class="inline-flex items-center px-6 py-3 rounded-2xl text-base font-bold bg-indigo-600 text-white shadow-lg">
                    <i id="fileIcon" class="fas fa-file-audio mr-3"></i> <span id="fileNameDisplay">archivo.mp4</span>
                </span>
            </div>
        </div>

        <div id="actionsSection" class="hidden grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8 fade-in">
            <button id="convertBtn" class="flex items-center justify-center gap-3 bg-slate-800 hover:bg-slate-900 text-white font-bold py-6 px-6 rounded-3xl transition-all shadow-xl active:scale-95 group">
                <i class="fas fa-file-audio text-indigo-400"></i> Extraer MP3
            </button>
            <button id="transcribeBtn" class="flex items-center justify-center gap-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-6 px-6 rounded-3xl transition-all shadow-xl active:scale-95 group">
                <i class="fas fa-wand-magic-sparkles text-indigo-200"></i> Transcribir IA
            </button>
        </div>

        <div id="progressState" class="hidden mb-8 bg-white p-8 rounded-[2rem] shadow-lg border border-slate-100 fade-in">
            <div class="flex items-center justify-between mb-4">
                <span id="progressLabel" class="text-sm font-black text-slate-500 uppercase tracking-widest">Iniciando...</span>
                <span id="percentLabel" class="text-xl font-black text-indigo-600">0%</span>
            </div>
            <div class="w-full bg-slate-100 rounded-full h-4 overflow-hidden">
                <div id="progressBar" class="bg-indigo-600 h-full rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
        </div>

        <div id="resultSection" class="hidden bg-white rounded-[2rem] shadow-2xl border border-slate-100 overflow-hidden mb-8 fade-in">
            <div class="bg-slate-50 px-8 py-6 border-b border-slate-100 flex flex-col sm:flex-row items-center justify-between gap-4">
                <h3 class="font-bold text-slate-800 flex items-center gap-3">
                    <i class="fas fa-align-left text-indigo-600"></i> TranscripciÃ³n
                </h3>
                <div class="flex gap-2 w-full sm:w-auto">
                    <button id="copyBtn" class="flex-1 sm:flex-none bg-white border border-slate-200 hover:bg-indigo-50 text-slate-700 px-5 py-3 rounded-2xl flex items-center justify-center gap-2 font-bold transition-all">
                        <i class="fas fa-copy"></i> Copiar
                    </button>
                    <button id="pdfBtn" class="flex-1 sm:flex-none bg-white border border-slate-200 hover:bg-red-50 text-slate-700 px-5 py-3 rounded-2xl flex items-center justify-center gap-2 font-bold transition-all">
                        <i class="fas fa-file-pdf text-red-500"></i> PDF
                    </button>
                </div>
            </div>
            <div class="p-8">
                <div id="transcriptionContent" class="text-slate-600 leading-relaxed custom-scrollbar whitespace-pre-wrap min-h-[250px] max-h-[600px] overflow-y-auto outline-none text-lg" contenteditable="true"></div>
            </div>
        </div>

        <div id="mp3DownloadSection" class="hidden bg-emerald-50 border border-emerald-200 p-8 rounded-[2rem] flex flex-col sm:flex-row items-center justify-between mb-8 fade-in gap-6">
            <div class="flex items-center gap-5">
                <div class="w-16 h-16 bg-emerald-500 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-emerald-200">
                    <i class="fas fa-check text-2xl"></i>
                </div>
                <div>
                    <h4 class="font-bold text-emerald-900 text-xl">Audio Listo</h4>
                    <p class="text-emerald-700">El MP3 se ha procesado localmente.</p>
                </div>
            </div>
            <a id="downloadMp3Link" href="#" class="w-full sm:w-auto bg-emerald-600 hover:bg-emerald-700 text-white px-10 py-5 rounded-2xl font-black transition-all shadow-xl flex items-center justify-center gap-3 active:scale-95">
                <i class="fas fa-download"></i> Descargar MP3
            </a>
        </div>
    </div>

    <div id="pwaInstallBanner" class="fade-in">
        <div class="flex items-center gap-4 mb-4">
            <img src="https://cdn-icons-png.flaticon.com/512/3060/3060714.png" class="w-12 h-12 rounded-xl" alt="App Icon">
            <div class="flex-1">
                <p class="font-black text-white">Instalar MediaMaster</p>
                <p id="pwaDesc" class="text-xs text-slate-400">Usa la herramienta como una App nativa.</p>
            </div>
            <button onclick="document.getElementById('pwaInstallBanner').style.display='none'" class="text-slate-500">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        <button id="installActionBtn" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all">
            AÃ‘ADIR A MI DISPOSITIVO
        </button>
    </div>

    <div id="messageBox" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-2xl transition-all transform translate-y-32 flex items-center gap-4 z-[200]">
        <span id="messageText" class="font-bold"></span>
    </div>

    <script>
        const manifest = {
            "name": "MediaMaster Pro",
            "short_name": "MediaMaster",
            "id": "/mediamaster/",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#ffffff",
            "theme_color": "#4f46e5",
            "description": "Herramienta profesional de transcripciÃ³n y audio",
            "icons": [{ "src": "https://cdn-icons-png.flaticon.com/512/3060/3060714.png", "sizes": "512x512", "type": "image/png", "purpose": "any maskable" }]
        };
        const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        const manifestLink = document.createElement('link');
        manifestLink.rel = 'manifest';
        manifestLink.href = URL.createObjectURL(manifestBlob);
        document.head.appendChild(manifestLink);

        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', e => self.skipWaiting());
                self.addEventListener('activate', e => e.waitUntil(clients.claim()));
                self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));
            `;
            const swBlob = new Blob([swCode], {type: 'application/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(swBlob));
        }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('pwaInstallBanner').style.display = 'block';
        });

        document.getElementById('installActionBtn').onclick = async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') document.getElementById('pwaInstallBanner').style.display = 'none';
                deferredPrompt = null;
            }
        };

        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        if (isIOS && !window.navigator.standalone) {
            document.getElementById('pwaInstallBanner').style.display = 'block';
            document.getElementById('pwaDesc').innerText = "Pulsa 'Compartir' y luego 'AÃ±adir a pantalla de inicio'";
            document.getElementById('installActionBtn').style.display = 'none';
        }

        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const actionsSection = document.getElementById('actionsSection');
        const resultSection = document.getElementById('resultSection');
        const mp3DownloadSection = document.getElementById('mp3DownloadSection');
        const progressState = document.getElementById('progressState');
        const progressBar = document.getElementById('progressBar');
        const progressLabel = document.getElementById('progressLabel');
        const percentLabel = document.getElementById('percentLabel');
        const transcriptionContent = document.getElementById('transcriptionContent');
        
        let currentFile = null;

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => { if (e.target.files.length > 0) handleFileSelect(e.target.files[0]); };

        function handleFileSelect(file) {
            currentFile = file;
            document.getElementById('fileNameDisplay').innerText = file.name;
            document.getElementById('selectedFileInfo').classList.remove('hidden');
            actionsSection.classList.remove('hidden');
            resultSection.classList.add('hidden');
            mp3DownloadSection.classList.add('hidden');
            progressState.classList.add('hidden');
            showMessage("Archivo seleccionado");
        }

        document.getElementById('convertBtn').onclick = async () => {
            if (!currentFile) return;
            showProgress("Extrayendo Audio...", 20);
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const arrayBuffer = await currentFile.arrayBuffer();
                const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                
                showProgress("Codificando MP3...", 50);
                const mp3encoder = new lamejs.Mp3Encoder(audioBuffer.numberOfChannels, audioBuffer.sampleRate, 128);
                const mp3Data = [];
                const left = audioBuffer.getChannelData(0);
                const right = audioBuffer.numberOfChannels > 1 ? audioBuffer.getChannelData(1) : left;
                
                const sampleBlockSize = 1152;
                for (let i = 0; i < left.length; i += sampleBlockSize) {
                    const lChunk = new Int16Array(sampleBlockSize);
                    const rChunk = new Int16Array(sampleBlockSize);
                    for (let j = 0; j < sampleBlockSize && (i+j) < left.length; j++) {
                        lChunk[j] = left[i+j] * 32767;
                        rChunk[j] = right[i+j] * 32767;
                    }
                    const mp3buf = mp3encoder.encodeBuffer(lChunk, rChunk);
                    if (mp3buf.length > 0) mp3Data.push(mp3buf);
                    if (i % 50000 === 0) updateProgressBar(50 + Math.floor((i/left.length)*45));
                }
                const finalBuf = mp3encoder.flush();
                if (finalBuf.length > 0) mp3Data.push(finalBuf);

                const blob = new Blob(mp3Data, { type: 'audio/mp3' });
                document.getElementById('downloadMp3Link').href = URL.createObjectURL(blob);
                document.getElementById('downloadMp3Link').download = currentFile.name.split('.')[0] + ".mp3";
                
                showProgress("Â¡Listo!", 100);
                setTimeout(() => {
                    progressState.classList.add('hidden');
                    mp3DownloadSection.classList.remove('hidden');
                }, 500);
            } catch (err) {
                showMessage("Error al procesar", "error");
            }
        };

        document.getElementById('transcribeBtn').onclick = async () => {
            if (!currentFile) return;
            showProgress("Analizando con IA...", 30);
            const reader = new FileReader();
            reader.readAsDataURL(currentFile);
            reader.onload = async () => {
                try {
                    const text = await callGeminiTranscription(reader.result.split(',')[1], currentFile.type);
                    transcriptionContent.innerText = text;
                    showProgress("Completado", 100);
                    setTimeout(() => {
                        progressState.classList.add('hidden');
                        resultSection.classList.remove('hidden');
                        resultSection.scrollIntoView({ behavior: 'smooth' });
                    }, 500);
                } catch (e) {
                    showMessage("Error en IA");
                    progressState.classList.add('hidden');
                }
            };
        };

        async function callGeminiTranscription(base64, mime) {
            const apiKey = ""; // El usuario debe insertar su clave aquÃ­ o se le pedirÃ¡
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [
                        { text: "Transcribe exactamente el contenido hablado de este archivo. Separa por pÃ¡rrafos y si hay varios interlocutores identifÃ­calos como Voz 1, Voz 2. No aÃ±adas comentarios propios." },
                        { inlineData: { mimeType: mime, data: base64 } }
                    ]}]
                })
            });
            const res = await response.json();
            return res.candidates[0].content.parts[0].text;
        }

        document.getElementById('copyBtn').onclick = () => {
            const el = document.createElement('textarea');
            el.value = transcriptionContent.innerText;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showMessage("Â¡Copiado!");
        };

        document.getElementById('pdfBtn').onclick = () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const lines = doc.splitTextToSize(transcriptionContent.innerText, 180);
            doc.text("MediaMaster - TranscripciÃ³n", 15, 15);
            doc.setFontSize(10);
            doc.text(lines, 15, 30);
            doc.save("transcripcion.pdf");
        };

        function showProgress(l, p) { progressState.classList.remove('hidden'); progressLabel.innerText = l; updateProgressBar(p); }
        function updateProgressBar(p) { progressBar.style.width = p+'%'; percentLabel.innerText = p+'%'; }
        function showMessage(t) {
            const b = document.getElementById('messageBox');
            document.getElementById('messageText').innerText = t;
            b.classList.remove('translate-y-32', 'hidden');
            setTimeout(() => b.classList.add('translate-y-32'), 2500);
        }
    </script>
</body>
</html>
